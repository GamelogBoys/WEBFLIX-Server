<!DOCTYPE html>
<html>

<head>
<title>WEBFLIX Sign In</title>
<link rel="stylesheet" href="style.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:#111;padding:40px;border-radius:10px;width:300px">

<h2>Sign In</h2>

<input id="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0">
<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0">

<button onclick="login()" style="width:100%;padding:10px;background:#e50914;color:white;border:none">
Login
</button>

<p id="msg"></p>

</div>

<script src="signin.js"></script>

</body>
</html>
